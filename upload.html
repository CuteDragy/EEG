{% extends "base.html" %}

{% block title %}EEG Dataset Server — Upload{% endblock %}

{% block content %}
  <div id="uploadBox" class="upload-box">
    <p>Drag a file here, or</p>
    <button id="pickBtn" class="btn-primary" type="button">Choose file</button>
    <input id="fileInput" type="file">
    <p id="fileNameLabel" style="margin-top:1rem; color:#64748b;">No file selected</p>
  </div>

  <button id="submitBtn" class="btn-primary" type="button" disabled>Upload</button>

  <div id="uploadResult"></div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/upload.js') }}"></script>
{% endblock %}
