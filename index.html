{% extends "base.html" %}

{% block title %}EEG Dataset Server — Dashboard{% endblock %}

{% block content %}
  <span id="statusPill" class="status">checking…</span>
  <div id="counts" style="color:#94a3b8; margin-bottom:1rem;"></div>

  <div class="controls">
    <input id="searchBox" placeholder="Search filename…">
    <select id="formatFilter">
      <option value="">All formats</option>
      <option value="edf">EDF</option>
      <option value="csv">CSV</option>
      <option value="tsv">TSV</option>
      <option value="npy">NPY</option>
      <option value="json">JSON</option>
    </select>
    <button id="deleteAllBtn" class="btn-danger">Delete all</button>
  </div>

  <table>
    <thead>
      <tr><th>Filename</th><th>Format</th><th>Size</th><th>Uploaded</th><th>Status</th><th></th></tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="emptyMsg" class="empty" style="display:none;">No datasets found.</div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
{% endblock %}
